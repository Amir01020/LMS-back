# API: https://api.bit-system.uz -> Docker backend (127.0.0.1:3000)
# Frontend уже развёрнут отдельно на https://bit-system.uz

upstream lms_api {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name api.bit-system.uz;
    return 301 https://api.bit-system.uz$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.bit-system.uz;

    ssl_certificate     /etc/letsencrypt/live/api.bit-system.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bit-system.uz/privkey.pem;

    client_max_body_size 10m;

    location / {
        proxy_pass http://lms_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
